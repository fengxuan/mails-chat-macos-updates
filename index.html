<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>MailsChat macOS Updates</title>
    <style>
      :root {
        color-scheme: light;
        --bg: #f5f1e8;
        --fg: #1f2933;
        --accent: #a94f2d;
      }

      body {
        margin: 0;
        font-family: "Iowan Old Style", "Palatino Linotype", serif;
        background: radial-gradient(circle at top, #fffdf8 0%, var(--bg) 65%);
        color: var(--fg);
      }

      main {
        max-width: 760px;
        margin: 0 auto;
        padding: 72px 24px;
      }

      h1 {
        margin: 0 0 12px;
        font-size: clamp(2rem, 4vw, 3.25rem);
        line-height: 1.05;
      }

      p {
        font-size: 1.05rem;
        line-height: 1.7;
      }

      a {
        color: var(--accent);
      }
    </style>
  </head>
  <body>
    <main>
      <h1>MailsChat macOS Updates</h1>
      <p>This site hosts the public Sparkle feed and release archives for the macOS app.</p>
      <p><a href="./mailschat/mac/appcast.xml">Open the Sparkle appcast</a></p>
    </main>
  </body>
</html>
